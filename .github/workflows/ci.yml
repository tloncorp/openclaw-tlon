name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install

      - name: Run unit tests
        run: npx vitest run src/ --exclude src/config-schema.test.ts

      - name: Run security tests
        run: npx vitest run src/security.test.ts

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install

      - name: Run integration tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TLONBOT_TOKEN: ${{ secrets.TLONBOT_TOKEN }}
        run: pnpm test:integration

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f dev/docker-compose.test.yml logs || true

  restart-ships:
    name: Restart Internal Ships
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    steps:
      - name: Set up kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"

      - name: Install tools
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          sudo apt-get update -qq && sudo apt-get install -y -qq jq apt-transport-https ca-certificates gnupg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          sudo apt-get update -qq && sudo apt-get install -y -qq google-cloud-cli-gke-gcloud-auth-plugin

      - name: Restart internal ships
        run: |
          for ctx in gke_prod-f0181862_us-east5_us-east5-cluster1 admin@ovh-oregon-1; do
            echo "=== Restarting internal ships in context: $ctx ==="
            kubectl --context "$ctx" get ships -n tlon -ojson \
              | jq -r '.items[] | select(.spec.internal == true) | .metadata.name' \
              | xargs -I {} sh -c 'kubectl --context "'"$ctx"'" rollout restart sts {} -n tlon &'
            wait
          done
